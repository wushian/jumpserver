services:
  db:
    image: postgres:15-alpine
    container_name: jms_db
    restart: always
    environment:
      POSTGRES_DB: jumpserver
      POSTGRES_USER: jumpserver
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jumpserver"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jms_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core:
    image: ghcr.io/wushian/jumpserver:master
    container_name: jms_core
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    ports:
      - "8070:8070"
    volumes:
      - ./config.yml:/opt/jumpserver/config.yml:ro
      - core_data:/opt/jumpserver/data
    environment:
      SECRET_KEY: ${SECRET_KEY}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DB_ENGINE: postgresql
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: jumpserver
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: jumpserver
      DOMAINS: ${DOMAINS:-172.17.1.25:8081}
    command: ["start", "all"]

  nginx:
    image: nginx:1.26-alpine
    container_name: jms_nginx
    restart: always
    depends_on:
      - core
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - core_data:/opt/jumpserver/data:ro

volumes:
  db_data:
  redis_data:
  core_data:
