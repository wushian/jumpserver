name: Build & Deploy

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/wushian/jumpserver

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  trigger-drone:
    name: Trigger Drone Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Notify Drone to deploy
        run: |
          HTTP_CODE=$(curl -s -o /tmp/drone_response.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.DRONE_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.DRONE_SERVER }}/api/repos/wushian/jumpserver/builds?branch=master")
          cat /tmp/drone_response.json
          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "Drone trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Drone build triggered (HTTP $HTTP_CODE)"
